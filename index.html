<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer IQ Matrix</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const PUZZLES = [
          {
            id: 1,
            question: "Complete the logical sequence: 2, 6, 12, 20, 30, ?",
            options: ["36", "40", "42", "46"],
            correct: "42"
          },
          {
            id: 2,
            question: "Which shape completes the rule: Matrix rotates 90° clockwise each step. If step 3 points Left, step 4 points...",
            options: ["Up", "Down", "Right", "Left"],
            correct: "Up"
          },
          {
            id: 3,
            question: "If Every Bleep is a Bloop, and Half of Bloops are Blips, are all Bleeps definitely Blips?",
            options: ["Yes, absolutely", "No, not necessarily", "Never", "Depends on the day"],
            correct: "No, not necessarily"
          }
        ];

        function MultiplayerIQGame() {
          const [roomCode, setRoomCode] = React.useState('');
          const [playerName, setPlayerName] = React.useState('');
          const [isJoined, setIsJoined] = React.useState(false);
          const [players, setPlayers] = React.useState({}); 
          const [currentPuzzleIdx, setCurrentPuzzleIdx] = React.useState(0);
          const [winnerMessage, setWinnerMessage] = React.useState('');
          const ws = React.useRef(null);

          const joinRoom = (e) => {
            e.preventDefault();
            if (!roomCode || !playerName) return alert("Fill in Room Code and Name!");

            const cleanRoom = roomCode.trim().toLowerCase();
            const socketUrl = `wss://iq-game-sync.karunakar.partykit.dev/parties/main/${cleanRoom}`;
            
            ws.current = new WebSocket(socketUrl);

            ws.current.onopen = () => {
              setIsJoined(true);
              sendMessage({ type: 'JOIN', name: playerName });
            };

            ws.current.onmessage = (event) => {
              const data = JSON.parse(event.data);
              if (data.type === 'STATE_UPDATE') {
                setPlayers(data.players);
                setCurrentPuzzleIdx(data.currentPuzzleIdx);
                if (data.winner) {
                  setWinnerMessage(`${data.winner} got the last one right!`);
                  setTimeout(() => setWinnerMessage(''), 3000);
                }
              }
            };
          };

          const sendMessage = (msg) => {
            if (ws.current && ws.current.readyState === WebSocket.OPEN) {
              ws.current.send(JSON.stringify(msg));
            }
          };

          const handleAnswerSubmit = (selectedOption) => {
            const currentPuzzle = PUZZLES[currentPuzzleIdx];
            if (selectedOption === currentPuzzle.correct) {
              sendMessage({
                type: 'SCORE_POINT',
                name: playerName,
                nextPuzzleIdx: (currentPuzzleIdx + 1) % PUZZLES.length
              });
            } else {
              alert("Wrong answer!");
            }
          };

          if (!isJoined) {
            return (
              <div class="min-h-screen flex flex-col items-center justify-center p-4 bg-slate-900">
                <div class="max-w-md w-full bg-slate-800 p-8 rounded-xl shadow-2xl border border-slate-700">
                  <h1 class="text-3xl font-black text-center text-indigo-400 mb-2">🧠 IQ MATRIX</h1>
                  <p class="text-slate-400 text-sm text-center mb-6">Real-time competitive multiplayer logic race.</p>
                  <form onSubmit={joinRoom} class="space-y-4">
                    <div>
                      <label class="block text-xs font-bold text-slate-400 mb-1">YOUR NAME</label>
                      <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} class="w-full bg-slate-950 border border-slate-700 rounded p-2.5 text-white" required />
                    </div>
                    <div>
                      <label class="block text-xs font-bold text-slate-400 mb-1">ROOM CODE</label>
                      <input type="text" value={roomCode} onChange={(e) => setRoomCode(e.target.value)} class="w-full bg-slate-950 border border-slate-700 rounded p-2.5 text-white uppercase" required />
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-3 px-4 rounded transition-all">Enter Game Lobby</button>
                  </form>
                </div>
              </div>
            );
          }

          const activePuzzle = PUZZLES[currentPuzzleIdx];

          return (
            <div class="min-h-screen p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-6 bg-slate-900">
              <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 h-fit">
                <h2 class="text-xl font-bold border-b border-slate-700 pb-3 text-indigo-400">👥 Room: {roomCode.toUpperCase()}</h2>
                <div class="mt-4 space-y-2">
                  {Object.entries(players).map(([name, score]) => (
                    <div key={name} class={`flex justify-between p-2.5 rounded text-sm ${name === playerName ? 'bg-indigo-600/20 border border-indigo-500' : 'bg-slate-950'}`}>
                      <span>{name}</span>
                      <span class="bg-indigo-900 px-2 rounded-full text-xs">{score} pts</span>
                    </div>
                  ))}
                </div>
              </div>
              <div class="lg:col-span-3 bg-slate-800 p-6 md:p-8 rounded-xl border border-slate-700 relative">
                {winnerMessage && <div class="absolute top-0 left-0 right-0 bg-emerald-600 text-center py-2 text-xs font-bold">{winnerMessage}</div>}
                <div class="max-w-2xl mx-auto w-full py-6">
                  <h3 class="text-xl md:text-2xl font-medium mt-4 text-slate-100">{activePuzzle.question}</h3>
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                    {activePuzzle.options.map((option, i) => (
                      <button key={i} onClick={() => handleAnswerSubmit(option)} class="w-full bg-slate-950 hover:bg-slate-700 border border-slate-700 rounded-lg p-4 text-left transition-all">{option}</button>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MultiplayerIQGame />);
    </script>
</body>
</html>
