<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Live IQ Arena</title>
    <style>
        :root {
            --bg: #020617;
            --surface: #0f172a;
            --element: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .panel {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .view { display: none; }
        .view.active { display: block; }
        h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 20px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        label { display: block; margin-top: 15px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--accent); letter-spacing: 0.05em; }
        input, select, button { width: 100%; padding: 16px; margin-top: 8px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; }
        input, select { background: var(--element); color: white; border: 1px solid rgba(255,255,255,0.05); }
        button { background: linear-gradient(90deg, #2563eb, #3b82f6); color: white; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.3); }
        .score-banner { display: flex; justify-content: space-between; background: var(--element); padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .options-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .opt-btn { background: var(--element); color: white; text-align: left; border: 1px solid rgba(255,255,255,0.03); padding: 16px; border-radius: 12px; cursor: pointer; font-size: 15px; transition: all 0.2s; }
        .opt-btn:hover { background: #24334d; border-color: var(--accent); }
        .difficulty-badge { display: inline-block; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: rgba(56,189,248,0.1); color: var(--accent); margin-bottom: 15px; }
        #status-lbl { margin-top: 20px; text-align: center; font-size: 14px; font-style: italic; color: #64748b; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="panel">
        
        <div id="lobby-view" class="view active">
            <h1>IQ Arena Matchmaking</h1>
            
            <label>Select Matrix Difficulty</label>
            <select id="difficulty-select">
                <option value="easy">Normal Logic (Baseline)</option>
                <option value="medium">Advanced Matrix (Tier-1 Standard)</option>
                <option value="hard">Quantum IQ (Extreme Traps)</option>
            </select>

            <label>Room Allocation Code</label>
            <input type="text" id="room-code-input" placeholder="Enter custom room identifier">
            
            <button id="btn-p1" onclick="joinRoom('player1')" style="margin-top: 25px;">Create Room as Player 1</button>
            <button id="btn-p2" onclick="joinRoom('player2')" style="background: #1e293b; border: 1px solid rgba(255,255,255,0.1); margin-top: 10px;">Join Room as Player 2</button>
        </div>

        <div id="game-view" class="view">
            <div class="score-banner">
                <div>P1 Score: <span id="p1-score-lbl">0</span></div>
                <div id="room-identity-lbl" style="color: var(--accent); font-weight: 700;">ROOM</div>
                <div>P2 Score: <span id="p2-score-lbl">0</span></div>
            </div>

            <div class="difficulty-badge" id="diff-tag">MEDIUM</div>
            <h2 id="question-payload-lbl">Fetching generation variables...</h2>

            <div class="options-stack" id="options-box"></div>
            <p id="status-lbl">Analyze the variables carefully...</p>
        </div>

    </div>

    <script>
        // Cleaned base URL string to guarantee cross-browser parsing compatibility
        const SUPABASE_URL = "https://dwjgilfxstogojdepbdh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3amdpbGZ4c3RvZ29qZGVwYmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDIzNjE3MjQsImV4cCI6MjA1NzkzNzcyNH0.b04rF5q8wZf6p9_rU4-Dby735h_C6b62P4vR0E6_3mE";
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { persistSession: false }
            });
        } catch (e) {
            alert("Initialization failure: Check if your network blocks Supabase CDNs.");
        }

        let currentRoom = null;
        let myRole = null;
        let currentDifficulty = 'medium';

        const questionPool = {
            easy: [
                { q: "Complete the numerical string parameters: 3, 6, 12, 24, (?)", a: ["30", "36", "48", "96"], c: 2 },
                { q: "Light is to shadow as Truth is to what variable?", a: ["Fact", "Deception", "Knowledge", "Reality"], c: 1 }
            ],
            medium: [
                { q: "If all algorithmic tracks are matrix streams, and all matrix streams are prone to automation, are all algorithmic tracks prone to automation?", a: ["Always true", "Never true", "Conditionally valid", "Insufficient parameters"], c: 0 },
                { q: "A specialized tech portfolio takes 5 weeks to mature. If its development speed doubles every week, when was it exactly half complete?", a: ["Week 2.5", "Week 4", "Week 1", "Week 3.5"], c: 1 }
            ],
            hard: [
                { q: "A structural allocation system has a 10% structural failure margin. If combined with a local EAPCET tier-3 infrastructure framework, the compound risk index triples. What is the active success percentage parameter?", a: ["70%", "90%", "30%", "0%"], c: 0 }
            ]
        };

        async function joinRoom(role) {
            const roomCode = document.getElementById('room-code-input').value.trim();
            currentDifficulty = document.getElementById('difficulty-select').value;
            if(!roomCode) return alert("Allocation room code code mandatory.");
            
            myRole = role;
            document.getElementById('btn-p1').innerText = "Connecting Data Pipeline...";
            document.getElementById('btn-p2').style.display = "none";

            try {
                if(role === 'player1') {
                    // Force-clear prior broken instances of the exact code
                    await supabase.from('game_rooms').delete().eq('room_code', roomCode);
                    
                    const { error } = await supabase.from('game_rooms').insert([{ 
                        room_code: roomCode, 
                        player_1_score: 0, 
                        player_2_score: 0, 
                        current_question: 0,
                        difficulty_tier: currentDifficulty
                    }]);
                    
                    if(error) throw error;
                }

                currentRoom = roomCode;
                switchActiveView('game-view');
                document.getElementById('room-identity-lbl').innerText = roomCode.toUpperCase();
                document.getElementById('diff-tag').innerText = currentDifficulty;

                // Dedicated real-time tracking engine
                supabase.channel(`room-${roomCode}`)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'game_rooms', 
                    filter: `room_code=eq.${roomCode}` 
                }, payload => {
                    if(payload && payload.new) {
                        updateGameState(payload.new);
                    }
                })
                .subscribe((status) => {
                    if(status === 'CHANNEL_ERROR') {
                        alert("Realtime synchronization blocked by local network profile.");
                    }
                });

                renderActiveQuestion(0);
            } catch (err) {
                alert("Network Core Rejection: Verify Row-Level Security (RLS) is disabled on Supabase dashboard.");
                document.getElementById('btn-p1').innerText = "Create Room as Player 1";
                document.getElementById('btn-p2').style.display = "block";
            }
        }

        function updateGameState(data) {
            document.getElementById('p1-score-lbl').innerText = data.player_1_score;
            document.getElementById('p2-score-lbl').innerText = data.player_2_score;
            renderActiveQuestion(data.current_question);
        }

        function renderActiveQuestion(index) {
            const pool = questionPool[currentDifficulty];
            if(index >= pool.length) {
                document.getElementById('question-payload-lbl').innerText = "Matrix Duel Complete.";
                document.getElementById('options-box').innerHTML = "";
                document.getElementById('status-lbl').innerText = "Final standings completely synchronized.";
                return;
            }

            const activeQ = pool[index];
            document.getElementById('question-payload-lbl').innerText = activeQ.q;
            
            const targetBox = document.getElementById('options-box');
            targetBox.innerHTML = "";

            activeQ.a.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => evaluationSelection(idx, activeQ.c, index);
                targetBox.appendChild(btn);
            });
            document.getElementById('status-lbl').innerText = "Awaiting real-time submission parameters...";
        }

        async function evaluationSelection(selected, correct, qIndex) {
            const isCorrect = (selected === correct);
            let updatePayload = {};

            document.getElementById('options-box').innerHTML = "";
            document.getElementById('status-lbl').innerText = "Processing live calculations...";

            try {
                if(isCorrect) {
                    const { data, error } = await supabase.from('game_rooms').select().eq('room_code', currentRoom).single();
                    if(error) throw error;
                    
                    if(myRole === 'player1') {
                        updatePayload.player_1_score = parseInt(data.player_1_score || 0) + 10;
                    } else {
                        updatePayload.player_2_score = parseInt(data.player_2_score || 0) + 10;
                    }
                }
                
                updatePayload.current_question = qIndex + 1;
                await supabase.from('game_rooms').update(updatePayload).eq('room_code', currentRoom);
            } catch(e) {
                alert("Error submitting score tracking update.");
            }
        }

        function switchActiveView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
