<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG/AP EAPCET Mock Test Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        // SAMPLE DATA (You can add all your PDF converted questions here!)
        const EAPCET_QUESTIONS = [
          {
            id: 1,
            subject: "Mathematics",
            question: "The value of lim (x->0) (sin x) / x is equal to:",
            options: ["0", "1", "Infinity", "Not Defined"],
            correct: "1"
          },
          {
            id: 2,
            subject: "Physics",
            question: "A vehicle travels half the distance with speed v1 and the other half with speed v2. Then its average speed is:",
            options: ["(v1 + v2)/2", "2v1v2 / (v1 + v2)", "v1v2", "sqrt(v1v2)"],
            correct: "2v1v2 / (v1 + v2)"
          },
          {
            id: 3,
            subject: "Chemistry",
            question: "Which of the following elements has the highest electronegativity?",
            options: ["Oxygen", "Fluorine", "Nitrogen", "Chlorine"],
            correct: "Fluorine"
          }
        ];

        function EapcetMockTest() {
          const [currentIdx, setCurrentIdx] = React.useState(0);
          const [answers, setAnswers] = React.useState({}); // { questionId: selectedOption }
          const [timeLeft, setTimeLeft] = React.useState(180 * 60); // 3 hours in seconds
          const [isSubmitted, setIsSubmitted] = React.useState(false);

          // Countdown Timer Effect
          React.useEffect(() => {
            if (timeLeft <= 0 || isSubmitted) return;
            const timer = setInterval(() => setTimeLeft(timeLeft - 1), 1000);
            return () => clearInterval(timer);
          }, [timeLeft, isSubmitted]);

          const formatTime = (seconds) => {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
          };

          const handleSelectOption = (option) => {
            if (isSubmitted) return;
            setAnswers({ ...answers, [EAPCET_QUESTIONS[currentIdx].id]: option });
          };

          const calculateScore = () => {
            let score = 0;
            EAPCET_QUESTIONS.forEach((q) => {
              if (answers[q.id] === q.correct) score++;
            });
            return score;
          };

          const activeQ = EAPCET_QUESTIONS[currentIdx];

          return (
            <div class="min-h-screen flex flex-col">
              {/* Exam Header bar */}
              <header class="bg-blue-800 text-white p-4 flex justify-between items-center shadow-md">
                <div>
                  <h1 class="text-xl font-bold tracking-tight">EAPCET PRACTICE PORTAL</h1>
                  <p class="text-xs text-blue-200">Previous Year Questions Mock Simulator</p>
                </div>
                <div class="bg-blue-950 px-4 py-2 rounded font-mono text-lg font-bold border border-blue-700">
                  ⏱️ Time Left: {formatTime(timeLeft)}
                </div>
              </header>

              {/* Main Arena Grid */}
              <div class="flex-1 grid grid-cols-1 lg:grid-cols-4 p-4 gap-6">
                
                {/* Left Area: Question Display Container */}
                <div class="lg:col-span-3 bg-white p-6 rounded-lg shadow border border-slate-200 flex flex-col justify-between">
                  {isSubmitted ? (
                    <div class="text-center py-12">
                      <h2 class="text-3xl font-black text-emerald-600 mb-2">🎉 TEST COMPLETED!</h2>
                      <p class="text-xl font-bold text-slate-700">Your Score: <span class="text-blue-600 text-2xl">{calculateScore()}</span> / {EAPCET_QUESTIONS.length}</p>
                      <p class="text-slate-500 text-sm mt-2">Review your answers using the sidebar panel.</p>
                      <button onClick={() => window.location.reload()} class="mt-6 bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">Try Again</button>
                    </div>
                  ) : (
                    <div>
                      <div class="flex justify-between items-center border-b border-slate-200 pb-3 mb-4">
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">{activeQ.subject}</span>
                        <span class="text-sm font-medium text-slate-500">Question {currentIdx + 1} of {EAPCET_QUESTIONS.length}</span>
                      </div>

                      <h3 class="text-lg font-semibold text-slate-900 leading-relaxed mb-6 whitespace-pre-line">
                        {activeQ.question}
                      </h3>

                      <div class="space-y-3">
                        {activeQ.options.map((option, index) => {
                          const isSelected = answers[activeQ.id] === option;
                          return (
                            <button
                              key={index}
                              onClick={() => handleSelectOption(option)}
                              class={`w-full text-left p-4 rounded-lg border transition-all flex items-center gap-3 font-medium cursor-pointer
                                ${isSelected ? 'bg-blue-50 border-blue-600 text-blue-900 ring-2 ring-blue-600/20' : 'bg-slate-50 border-slate-200 hover:bg-slate-100'}`}
                            >
                              <span class={`w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold border 
                                ${isSelected ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 border-slate-300'}`}>
                                {String.fromCharCode(65 + index)}
                              </span>
                              {option}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* Navigation Footer Action Buttons */}
                  {!isSubmitted && (
                    <div class="border-t border-slate-200 pt-4 mt-8 flex justify-between">
                      <button 
                        disabled={currentIdx === 0}
                        onClick={() => setCurrentIdx(currentIdx - 1)}
                        class="px-4 py-2 rounded font-semibold border border-slate-300 hover:bg-slate-100 disabled:opacity-40 disabled:cursor-not-allowed"
                      >
                        ← Previous
                      </button>
                      <button 
                        onClick={() => setIsSubmitted(true)}
                        class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded font-bold transition-all shadow"
                      >
                        Submit Test
                      </button>
                      <button 
                        disabled={currentIdx === EAPCET_QUESTIONS.length - 1}
                        onClick={() => setCurrentIdx(currentIdx + 1)}
                        class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded font-semibold transition-all"
                      >
                        Next →
                      </button>
                    </div>
                  )}
                </div>

                {/* Right Area: Sidebar Question Palette Map */}
                <div class="lg:col-span-1 bg-white p-4 rounded-lg shadow border border-slate-200 h-fit">
                  <h4 class="font-bold text-sm text-slate-500 uppercase tracking-wider border-b border-slate-200 pb-2 mb-4">Question Palette</h4>
                  <div class="grid grid-cols-4 gap-2">
                    {EAPCET_QUESTIONS.map((q, idx) => {
                      const isAnswered = answers[q.id] !== undefined;
                      const isActive = idx === currentIdx;
                      
                      let btnClass = "bg-slate-100 text-slate-700 border-slate-200";
                      if (isAnswered) btnClass = "bg-emerald-600 text-white border-emerald-600";
                      if (isActive) btnClass = "bg-blue-600 text-white border-blue-600 ring-2 ring-offset-2 ring-blue-500";
                      if (isSubmitted) {
                        const isCorrect = answers[q.id] === q.correct;
                        btnClass = isCorrect ? "bg-emerald-500 text-white" : "bg-rose-500 text-white";
                      }

                      return (
                        <button
                          key={idx}
                          onClick={() => setCurrentIdx(idx)}
                          class={`w-full aspect-square flex items-center justify-center rounded border text-sm font-bold transition-all cursor-pointer ${btnClass}`}
                        >
                          {idx + 1}
                        </button>
                      );
                    })}
                  </div>

                  {/* Info Legend tags */}
                  <div class="mt-6 pt-4 border-t border-slate-200 space-y-2 text-xs font-semibold text-slate-500">
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-slate-200 rounded"></span> Unanswered</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-emerald-600 rounded"></span> Saved / Answered</div>
                    <div class="flex items-center gap-2"><span class="w-3 h-3 bg-blue-600 rounded"></span> Current Active Question</div>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<EapcetMockTest />);
    </script>
</body>
</html>
