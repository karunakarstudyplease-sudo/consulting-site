<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Multiplayer IQ Duel</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .setup-box, .game-box {
            background: var(--surface);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-box { display: none; }
        h1 { font-size: 24px; margin-bottom: 15px; text-align: center; color: var(--accent); }
        input, button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
        }
        input { background: #334155; color: white; text-align: center; }
        button { background: var(--accent); color: #020617; cursor: pointer; transition: 0.2s; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #334155;
        }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .option-btn { background: #334155; color: white; text-align: left; }
        .option-btn:hover { background: #475569; }
        #status-msg { margin-top: 15px; text-align: center; font-style: italic; color: #94a3b8; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="setup-screen" class="setup-box">
        <h1>IQ Multiplayer Duel</h1>
        <p style="text-align: center; color: #94a3b8; font-size: 14px;">Create or join a room code to play live with a friend.</p>
        <input type="text" id="room-input" placeholder="Enter Room Code (e.g., IQ99)">
        <button id="start-btn" onclick="initConnection()">Connect & Start Game</button>
    </div>

    <div id="game-screen" class="game-box">
        <div class="score-board">
            <div>You: <span id="my-score">0</span></div>
            <div>Opponent: <span id="opp-score">0</span></div>
        </div>
        <h2 id="question-text">Loading IQ Question...</h2>
        <div class="options-grid" id="options-container">
            </div>
        <p id="status-msg">Waiting for opponent to connect...</p>
    </div>

    <script>
        let peer = null;
        let conn = null;
        let myScore = 0;
        let oppScore = 0;
        let currentQuestionIndex = 0;

        const questions = [
            { q: "If all Bloops are Razzies and all Razzies are Lallos, are all Bloops definitely Lallos?", a: ["Yes", "No", "Cannot be determined"], correct: 0 },
            { q: "Which number comes next in the logic sequence: 2, 4, 8, 16, ...?", a: ["20", "24", "32", "64"], correct: 2 },
            { q: "A bat and ball cost ₹110 in total. The bat costs ₹100 more than the ball. How much does the ball cost?", a: ["₹10", "₹5", "₹0", "₹55"], correct: 1 }
        ];

        function initConnection() {
            const roomId = document.getElementById('room-input').value.trim();
            if(!roomId) return alert("Please type a room code!");

            document.getElementById('start-btn').innerText = "Connecting...";

            // Connect to a free, public cloud signaling engine
            peer = new Peer(roomId + '-player-' + Math.floor(Math.random()*1000));

            peer.on('open', (id) => {
                // Try connecting to the companion player slot in that room
                let targets = [roomId + '-player-1', roomId + '-player-2'];
                let target = targets.find(t => t !== id);
                
                conn = peer.connect(roomId);
                
                // Set up incoming hooks if someone connects to us
                peer.on('connection', (incomingConn) => {
                    conn = incomingConn;
                    setupReceiver();
                });

                if(conn) setupReceiver();
                
                // Force reveal game board
                document.getElementById('setup-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                loadQuestion();
            });
        }

        function setupReceiver() {
            conn.on('data', (data) => {
                if(data.type === 'ANSWERED') {
                    if(data.isCorrect) {
                        oppScore += 10;
                        document.getElementById('opp-score').innerText = oppScore;
                        document.getElementById('status-msg').innerText = "Opponent got it right! Moving on...";
                    } else {
                        document.getElementById('status-msg').innerText = "Opponent guessed wrong!";
                    }
                    setTimeout(nextQuestion, 2000);
                }
            });
        }

        function loadQuestion() {
            if(currentQuestionIndex >= questions.length) {
                document.getElementById('question-text').innerText = "Game Over!";
                document.getElementById('options-container').innerHTML = "";
                document.getElementById('status-msg').innerText = myScore > oppScore ? "You win the IQ duel!" : "Opponent wins!";
                return;
            }

            let currentQ = questions[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQ.q;
            
            let container = document.getElementById('options-container');
            container.innerHTML = "";
            document.getElementById('status-msg').innerText = "Analyze quickly...";

            currentQ.a.forEach((option, index) => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = option;
                btn.onclick = () => submitAnswer(index);
                container.appendChild(btn);
            });
        }

        function submitAnswer(selectedIndex) {
            let currentQ = questions[currentQuestionIndex];
            let isCorrect = (selectedIndex === currentQ.correct);

            if(isCorrect) {
                myScore += 10;
                document.getElementById('my-score').innerText = myScore;
                document.getElementById('status-msg').innerText = "Correct! Points secured.";
            } else {
                document.getElementById('status-msg').innerText = "Incorrect choice.";
            }

            // Send data packet over WebSockets to opponent screen instantly
            if(conn && conn.open) {
                conn.send({ type: 'ANSWERED', isCorrect: isCorrect });
            }

            setTimeout(nextQuestion, 2000);
        }

        function nextQuestion() {
            currentQuestionIndex++;
            loadQuestion();
        }
    </script>
</body>
</html>
